<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  font-family: 'Lato', sans-serif;
}

/* Background */
#bg {
  position: fixed;
  inset: 0;
  background: url("yourphoto.jpg.jpeg") no-repeat center/cover;
  z-index: -2;
}

/* Overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: -1;
}

/* Entry Screen */
#entryScreen {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.6);
  z-index: 10;
}

.entryText {
  color: #ff9ecb;
  font-size: 24px;
  cursor: pointer;
  text-shadow: 0 0 10px rgba(255, 158, 203, 0.8);
  transition: 0.3s;
}

.entryText:hover {
  transform: scale(1.1);
}

/* Card */
.card {
  width: clamp(260px, 85vw, 420px);
  max-height: 80vh;
  overflow-y: auto;

  padding: clamp(15px, 4vw, 25px);

  background: rgba(20, 4, 14, 0.55);
  backdrop-filter: blur(12px);

  border-radius: 20px;
  text-align: center;

  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);

  opacity: 0;
  transform: scale(0.9);
  transition: all 0.5s ease;
}

/* Text */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(20px, 5vw, 28px);
  color: #ff9ecb;
  margin-bottom: 15px;
}

p {
  font-size: clamp(13px, 3.5vw, 16px);
  color: #f1f5f9;
  line-height: 1.6;
  margin-bottom: 15px;
}

/* Button */
button {
  padding: 10px 20px;
  border: none;
  background: linear-gradient(45deg, #ff4d6d, #ff9ecb);
  color: white;
  font-size: clamp(13px, 3.5vw, 16px);
  border-radius: 20px;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(255, 77, 109, 0.6);
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* Hidden message */
#msg {
  display: none;
  opacity: 0;
  margin-top: 15px;
  color: #ffe4ec;
  font-weight: bold;
  font-size: clamp(13px, 3.5vw, 15px);
  line-height: 1.5;
}

/* Floating emojis */
.heart {
  position: fixed;
  bottom: -10px;
  animation: floatUp 6s linear forwards;
}

@keyframes floatUp {
  to {
    transform: translateY(-100vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div id="bg"></div>
<div class="overlay"></div>

<div id="entryScreen">
  <div class="entryText" onclick="openCard()">Tap to open ❤️</div>
</div>

<audio id="bgMusic">
  <source src="song.mp3.mp3" type="audio/mpeg">
</audio>

<div class="card">
  <h1>Hey my sweet little baby girl ❤️</h1>

  <p id="typingText"></p>

  <button onclick="startExperience()">Tap here ❤️</button>

  <div id="msg">
    When things get heavy, run into my arms.<br>
    I'm always here for you ❤️<br><br>
    Go and give the exam like the strong girl I love ❤️
  </div>
</div>

<script>
const message = `I know you're stressed... I know you're scared.
This exam does NOT define you.

You've worked hard. You've come this far.

I know how much effort you gave 

Even if no one sees it, I do.

 And I'm ALWAYS proud of you ❤️`;

function typeText() {
  let i = 0;
  const speed = 25;
  const target = document.getElementById("typingText");
  target.innerHTML = "";

  function typing() {
    if (i < message.length) {
      if (message.charAt(i) === "\n") {
        target.innerHTML += "<br><br>";
      } else {
        target.innerHTML += message.charAt(i);
      }
      i++;
      setTimeout(typing, speed);
    }
  }

  typing();
}

function openCard() {
  document.getElementById("entryScreen").style.display = "none";

  const card = document.querySelector(".card");
  card.style.opacity = "1";
  card.style.transform = "scale(1)";

  typeText();
}

function startExperience() {
  const music = document.getElementById("bgMusic");
  music.play().catch(() => alert("Tap again ❤️"));

  const msg = document.getElementById("msg");
  msg.style.display = "block";

  setTimeout(() => {
    msg.style.transition = "opacity 1.5s ease";
    msg.style.opacity = "1";
  }, 100);

  setInterval(createHeart, 300);
}

function createHeart() {
  const symbols = ["❤️", "💕", "💖", "✨", "🌸"];

  const heart = document.createElement("div");
  heart.classList.add("heart");

  heart.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}
</script>

</body>
</html>
